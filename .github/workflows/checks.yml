name: Checks

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        run: |
          install.packages(
            c("readr", "tibble", "testthat", "shiny"),
            repos = "https://cloud.r-project.org"
          )
        shell: Rscript {0}

      - name: Run tests
        run: Rscript tests/testthat.R

      - name: Validate app syntax
        run: |
          parse(file = "R/obfuscator_core.R")
          parse(file = "R/shiny_app.R")
          parse(file = "app.R")
        shell: Rscript {0}
